<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>מכונת הלוכד</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Assistant:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --acc: 6,182,212; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body.game-active { overflow: hidden; height: 100%; background: #020617; }
    body:not(.game-active) { overflow-y: auto; min-height: 100dvh; background: #000; }
    html { height: 100%; }
    #root { height: 100dvh; display: none; }
    .font-orb { font-family: 'Orbitron', monospace; }
    .font-heb { font-family: 'Assistant', sans-serif; }

    /* ═══ GAME CSS ═══ */
    @keyframes machine-breathe {
      0%,100% { box-shadow:0 0 8px rgba(var(--acc),.22),0 0 20px rgba(var(--acc),.10),0 0 40px rgba(var(--acc),.05),inset 0 0 16px rgba(var(--acc),.03); border-color:rgba(var(--acc),.45); }
      50%      { box-shadow:0 0 14px rgba(var(--acc),.38),0 0 36px rgba(var(--acc),.18),0 0 70px rgba(var(--acc),.09),inset 0 0 28px rgba(var(--acc),.06); border-color:rgba(var(--acc),.65); }
    }
    @keyframes accent-btn-glow {
      0%,100%{ box-shadow:0 0 18px rgba(var(--acc),.4),0 8px 20px rgba(0,0,0,.7); }
      50%    { box-shadow:0 0 36px rgba(var(--acc),.82),0 0 60px rgba(var(--acc),.32),0 8px 20px rgba(0,0,0,.7); }
    }
    .accent-btn-glow { animation: accent-btn-glow 2s ease-in-out infinite; }

    @keyframes belt-move { from{background-position:0 0} to{background-position:-80px 0} }
    .belt-anim { animation: belt-move 1.8s linear infinite; }
    @keyframes vert-move { from{background-position:0 0} to{background-position:0 48px} }
    .vert-anim { animation: vert-move 1.6s linear infinite; }

    .metal   { background: linear-gradient(90deg,#1e293b 0%,#475569 20%,#94a3b8 50%,#475569 80%,#1e293b 100%); }
    .caution { background: repeating-linear-gradient(-45deg,rgba(234,179,8,.18) 0,rgba(234,179,8,.18) 12px,rgba(0,0,0,.35) 12px,rgba(0,0,0,.35) 24px); }

    @keyframes shake {
      0%,100%{ transform:translate(0,0) rotate(0); }
      15%    { transform:translate(-5px,2px) rotate(-.3deg); }
      30%    { transform:translate(5px,-2px) rotate(.3deg); }
      45%    { transform:translate(-4px,1px) rotate(-.2deg); }
      60%    { transform:translate(4px,-1px) rotate(.2deg); }
      75%    { transform:translate(-2px,0); }
      90%    { transform:translate(2px,0); }
    }
    .do-shake { animation: shake .35s ease-out; }

    @keyframes score-pop {
      0%  { transform:scale(1);   color:#94a3b8; text-shadow:none; }
      35% { transform:scale(1.5); color:#fde047; text-shadow:0 0 20px #fde047,0 0 50px rgba(253,224,71,.6); }
      100%{ transform:scale(1);   color:#cbd5e1; text-shadow:none; }
    }
    .score-pop { animation: score-pop .7s ease-out; }

    @keyframes p-fly {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(.1); opacity:0; }
    }
    .particle { position:absolute; border-radius:50%; pointer-events:none; animation:p-fly .7s cubic-bezier(.2,.8,.4,1) forwards; }

    @keyframes msg-float {
      0%  { transform:translateX(-50%) translateY(0) scale(.8); opacity:0; }
      18% { transform:translateX(-50%) translateY(-12px) scale(1.1); opacity:1; }
      75% { transform:translateX(-50%) translateY(-22px) scale(1); opacity:1; }
      100%{ transform:translateX(-50%) translateY(-40px) scale(.9); opacity:0; }
    }
    .msg-float { position:absolute; left:50%; animation:msg-float 1.8s ease-out forwards; white-space:nowrap; pointer-events:none; z-index:60; font-family:'Assistant',sans-serif; }

    @keyframes modal-in {
      from{ transform:scale(.8) translateY(24px); opacity:0; }
      to  { transform:scale(1) translateY(0); opacity:1; }
    }
    .modal-in { animation: modal-in .45s cubic-bezier(.34,1.56,.64,1) forwards; }

    @keyframes btn-glow {
      0%,100%{ box-shadow:0 0 18px rgba(59,130,246,.4),0 8px 20px rgba(0,0,0,.6); }
      50%    { box-shadow:0 0 32px rgba(59,130,246,.75),0 0 55px rgba(59,130,246,.3),0 8px 20px rgba(0,0,0,.6); }
    }
    .btn-glow { animation: btn-glow 2s ease-in-out infinite; }

    @keyframes spot-pulse { 0%,100%{opacity:.12} 50%{opacity:.25} }
    .spot-pulse { animation: spot-pulse 1.2s ease-in-out infinite; }

    .scanlines::after {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:35;
      background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);
    }

    @keyframes item-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    @keyframes timer-danger {
      0%,100%{ background:rgba(127,29,29,.45); border-color:rgba(185,28,28,.6); }
      50%    { background:rgba(185,28,28,.7);  border-color:rgba(239,68,68,.9); }
    }
    .timer-danger { animation: timer-danger .55s ease-in-out infinite; }

    @keyframes rare-halo { 0%,100%{opacity:.5} 50%{opacity:1} }
    .rare-halo { animation: rare-halo 1s ease-in-out infinite; }

    /* ═══ RETRO THEME ═══ */
    @keyframes retro-breathe {
      0%,100% { box-shadow:0 0 14px rgba(180,100,20,.5),0 0 40px rgba(180,100,20,.25),0 0 80px rgba(180,100,20,.1),inset 0 0 28px rgba(180,100,20,.06); border-color:rgba(180,100,20,.65); }
      50%      { box-shadow:0 0 26px rgba(245,158,11,.88),0 0 65px rgba(245,158,11,.45),0 0 130px rgba(245,158,11,.2),inset 0 0 50px rgba(245,158,11,.13); border-color:rgba(251,191,36,.95); }
    }
    @keyframes retro-btn-glow {
      0%,100%{ box-shadow:0 0 18px rgba(245,158,11,.4),0 8px 20px rgba(0,0,0,.6); }
      50%    { box-shadow:0 0 34px rgba(251,191,36,.8),0 0 58px rgba(245,158,11,.32),0 8px 20px rgba(0,0,0,.6); }
    }
    .retro-btn-glow { animation: retro-btn-glow 2s ease-in-out infinite; }
    @keyframes retro-timer-danger {
      0%,100%{ background:rgba(100,30,5,.5); border-color:rgba(160,55,10,.65); }
      50%    { background:rgba(185,65,10,.78); border-color:rgba(235,95,20,.98); }
    }
    .retro-timer-danger { animation: retro-timer-danger .55s ease-in-out infinite; }
    .retro-stripe { background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0,rgba(0,0,0,.18) 1px,transparent 1px,transparent 4px),repeating-linear-gradient(90deg,rgba(160,90,15,.5) 0,rgba(160,90,15,.5) 22px,rgba(70,35,5,.65) 22px,rgba(70,35,5,.65) 44px); }

    /* ═══ FUTURISTIC THEME ═══ */
    @keyframes future-breathe {
      0%,100% { box-shadow:0 0 24px rgba(147,51,234,.95),0 0 65px rgba(147,51,234,.55),0 0 130px rgba(147,51,234,.28),0 0 240px rgba(147,51,234,.12),inset 0 0 55px rgba(147,51,234,.18); border-color:rgba(147,51,234,.95); }
      50%      { box-shadow:0 0 50px rgba(168,85,247,1),0 0 120px rgba(168,85,247,.88),0 0 250px rgba(168,85,247,.48),0 0 450px rgba(168,85,247,.20),inset 0 0 100px rgba(168,85,247,.32); border-color:rgba(216,180,254,1); }
    }
    @keyframes future-btn-glow {
      0%,100%{ box-shadow:0 0 28px rgba(168,85,247,.8),0 0 60px rgba(168,85,247,.4),0 8px 20px rgba(0,0,0,.9); }
      50%    { box-shadow:0 0 60px rgba(168,85,247,1),0 0 120px rgba(168,85,247,.65),0 0 180px rgba(168,85,247,.30),0 8px 20px rgba(0,0,0,.9); }
    }
    .future-btn-glow { animation: future-btn-glow 2s ease-in-out infinite; }
    @keyframes future-timer-danger {
      0%,100%{ background:rgba(0,15,50,.52); border-color:rgba(0,80,180,.68); }
      50%    { background:rgba(0,55,140,.75); border-color:rgba(0,210,255,.98); }
    }
    .future-timer-danger { animation: future-timer-danger .55s ease-in-out infinite; }
    .future-stripe { background:linear-gradient(90deg,transparent 0%,rgba(var(--acc),.07) 22%,rgba(var(--acc),.45) 45%,rgba(255,255,255,.55) 50%,rgba(var(--acc),.45) 55%,rgba(var(--acc),.07) 78%,transparent 100%); box-shadow:0 0 10px 2px rgba(var(--acc),.38),0 0 24px 5px rgba(var(--acc),.16),0 18px 48px rgba(var(--acc),.08); }

    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .animate-bounce { animation: bounce .9s ease-in-out infinite; }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.45} }
    .animate-pulse  { animation: pulse 2s ease-in-out infinite; }

    @keyframes star-spin { from{transform:rotate(0deg) scale(1)} to{transform:rotate(360deg) scale(1.2)} }
    .star-spin { animation: star-spin 1.5s linear infinite; }

    @keyframes dot-fill { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
    .dot-fill { animation: dot-fill .35s cubic-bezier(.34,1.56,.64,1) forwards; }

    .claw-arm { transition: transform .32s cubic-bezier(.4,0,.2,1); }

    /* ═══ WELCOME & EDITOR CSS (matches rep.html) ═══ */
    #welcome-screen {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: clamp(24px,6vmin,48px);
      background: #000;
      font-family: 'Assistant', sans-serif;
    }
    .wlc-title {
      font-size: clamp(32px,6vmin,52px); font-weight: 800;
      color: #e8e4f8; letter-spacing: -.5px; margin-bottom: 10px;
    }
    .wlc-sub {
      font-size: clamp(14px,1.8vmin,17px); color: #6a6e84;
      max-width: 440px; line-height: 1.8;
      margin-bottom: clamp(36px,6vmin,56px);
    }
    .wlc-btns {
      display: flex; flex-direction: row; gap: 14px;
      width: 100%; max-width: 440px;
    }
    .wlc-btn {
      padding: 16px 24px; font-size: clamp(15px,1.8vmin,17px);
      border: none; border-radius: 14px; cursor: pointer;
      font-weight: 700; font-family: 'Assistant', sans-serif;
      transition: transform .15s, box-shadow .2s;
      min-height: 54px; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .wlc-btn:active { transform: scale(.96); }
    .wlc-btn-secondary { background: rgba(255,255,255,.05); color: #9a9ab0; border: 1px solid rgba(255,255,255,.08); }
    .wlc-btn-secondary:hover { background: rgba(255,255,255,.09); transform: scale(1.02); }
    .wlc-btn-primary { background: #7c3aed; color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,.25); }
    .wlc-btn-primary:hover { background: #8b5cf6; box-shadow: 0 6px 28px rgba(124,58,237,.4); transform: scale(1.02); }

    #editor-screen { min-height:100dvh; padding:0 clamp(16px,5vw,64px) clamp(32px,5vmin,56px); background:#0b0b15; max-width:1400px; margin:0 auto; padding-top:68px; color:#e0e0f0; font-family:'Assistant',sans-serif; }
    .editor-topbar { position:fixed; top:0; left:0; right:0; z-index:500; display:flex; align-items:center; justify-content:space-between; padding:12px clamp(16px,5vw,64px); background:rgba(11,11,21,.94); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,.04); }
    .editor-topbar h2 { font-size:clamp(15px,2.2vmin,19px); color:#e8e4f8; font-weight:700; margin:0; letter-spacing:.2px; }
    .editor-topbar-actions { display:flex; gap:10px; }
    .editor-topbar .e-btn { padding:8px 20px; font-size:clamp(12px,1.5vmin,14px); min-height:38px; border-radius:10px; }
    .editor-header { text-align:center; padding:clamp(16px,3vmin,28px) 0 clamp(8px,1.5vmin,12px); }
    .editor-header p { font-size:clamp(13px,1.6vmin,15px); color:#6a6e84; letter-spacing:.3px; }
    .editor-body { display:flex; flex-direction:column; gap:0; }
    @media(min-width:720px){
      .editor-body { display:grid; grid-template-columns:1fr 1fr; gap:0 clamp(24px,3.5vw,48px); }
      .editor-body .sec-images    { grid-column:1; grid-row:1/5; }
      .editor-body .sec-texts     { grid-column:2; grid-row:1; }
      .editor-body .sec-difficulty{ grid-column:2; grid-row:2; }
      .editor-body .sec-theme     { grid-column:2; grid-row:3; }
      .editor-body .sec-share     { grid-column:1/3; grid-row:5; }
    }
    .theme-btn-wrap { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .theme-card { flex:1; padding:14px 8px 12px; font-size:clamp(13px,1.5vmin,15px); border:2px solid rgba(255,255,255,.06); background:rgba(255,255,255,.03); color:#7a7e94; border-radius:14px; cursor:pointer; font-family:'Assistant',sans-serif; font-weight:600; transition:all .22s; min-height:72px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; }
    .theme-card:hover { background:rgba(255,255,255,.07); }
    .theme-card .tc-icon { font-size:22px; line-height:1; }
    .theme-card .tc-lbl { font-size:clamp(12px,1.4vmin,14px); }
    .theme-card.active.robot  { border-color:#06b6d4; background:rgba(6,182,212,.08); color:#67e8f9; box-shadow:0 0 16px rgba(6,182,212,.15); }
    .theme-card.active.retro  { border-color:#f59e0b; background:rgba(245,158,11,.08); color:#fcd34d; box-shadow:0 0 16px rgba(245,158,11,.15); }
    .theme-card.active.future { border-color:#a855f7; background:rgba(168,85,247,.08); color:#d8b4fe; box-shadow:0 0 16px rgba(168,85,247,.15); }
    .palette-row { display:flex; gap:7px; padding-top:16px; margin-top:16px; border-top:1px solid rgba(255,255,255,.05); }
    .palette-swatch { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; }
    .palette-dot { width:100%; height:38px; border-radius:10px; border:2px solid transparent; transition:all .22s; }
    .palette-swatch:hover .palette-dot { transform:translateY(-2px); border-color:rgba(255,255,255,.28); }
    .palette-swatch.active .palette-dot { border-color:rgba(255,255,255,.70); transform:translateY(-2px); }
    .palette-name { font-size:10px; color:#5a5e78; font-family:'Assistant',sans-serif; font-weight:600; transition:color .2s; letter-spacing:.3px; }
    .palette-swatch.active .palette-name { color:#b0aac8; }
    .editor-section { margin-bottom:clamp(20px,3.5vmin,32px); background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.04); border-radius:16px; padding:clamp(20px,3vmin,30px); }
    .editor-section h3 { font-size:clamp(11px,1.3vmin,12px); color:#6e7090; margin-bottom:clamp(14px,2.5vmin,22px); font-weight:700; letter-spacing:1.2px; text-transform:uppercase; }
    .sub-label { font-size:clamp(10px,1.2vmin,12px); color:#5a5e78; font-weight:700; letter-spacing:.9px; text-transform:uppercase; margin:clamp(16px,2.5vmin,22px) 0 clamp(10px,1.5vmin,14px); padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,.04); }
    .sub-label:first-of-type { margin-top:0; }
    .asset-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(10px,1.8vmin,16px); }
    .asset-item { min-width:0; }
    .asset-item > label:not(.upload-btn):not(.asset-placeholder) { display:block; font-size:clamp(11px,1.4vmin,13px); color:#8a8ea4; margin-bottom:6px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .asset-thumb { position:relative; width:100%; aspect-ratio:1; border-radius:12px; overflow:hidden; margin-bottom:8px; border:1px solid rgba(255,255,255,.05); background:#12121e; }
    .asset-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .asset-overlay { position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px 6px; background:rgba(0,0,0,.62); backdrop-filter:blur(4px); }
    .upload-btn,.del-btn { display:flex; align-items:center; justify-content:center; padding:0 8px; font-size:clamp(10px,1.2vmin,12px); border-radius:7px; cursor:pointer; font-family:'Assistant',sans-serif; height:28px; line-height:1; box-sizing:border-box; transition:all .2s; font-weight:600; flex:1; white-space:nowrap; }
    .upload-btn { border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.1); color:#e8e8f0; }
    .upload-btn:hover { background:rgba(255,255,255,.25); color:#fff; }
    .del-btn { border:1px solid rgba(255,80,80,.3); background:rgba(255,60,60,.12); color:#ff8888; flex:0 0 36px; padding:0; font-size:18px; }
    .del-btn:hover { background:rgba(255,60,60,.3); color:#ffaaaa; }
    input[type="file"] { display:none; }
    .asset-placeholder { width:100%; aspect-ratio:1; border-radius:12px; border:2px dashed rgba(255,255,255,.1); background:rgba(255,255,255,.02); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:all .2s; color:#6a6e84; font-size:clamp(12px,1.4vmin,14px); font-weight:500; }
    .asset-placeholder:hover { background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.18); color:#a0a4b8; }
    .asset-placeholder .plus-icon { font-size:clamp(28px,4vmin,40px); line-height:1; color:#555570; transition:color .2s; }
    .asset-placeholder:hover .plus-icon { color:#8a8ea4; }
    .diff-group { display:flex; gap:10px; }
    .diff-btn { flex:1; padding:12px 8px; font-size:clamp(13px,1.5vmin,15px); border:2px solid rgba(255,255,255,.06); background:rgba(255,255,255,.03); color:#7a7e94; border-radius:12px; cursor:pointer; font-family:'Assistant',sans-serif; font-weight:600; transition:all .2s; min-height:48px; display:flex; align-items:center; justify-content:center; }
    .diff-btn:hover { background:rgba(255,255,255,.07); }
    .diff-btn.active { border-color:#7c3aed; background:rgba(124,58,237,.1); color:#c4b5fd; }
    .field-group { margin-bottom:20px; }
    .field-group:last-child { margin-bottom:0; }
    .field-label { display:block; font-size:clamp(12px,1.5vmin,14px); color:#9a9eb4; margin-bottom:10px; font-weight:500; letter-spacing:.2px; }
    .text-field { width:100%; padding:14px 18px; font-size:16px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:12px; color:#d0d4e4; font-family:'Assistant',sans-serif; min-height:48px; resize:vertical; transition:border-color .2s,box-shadow .2s; line-height:1.5; }
    .text-field:focus { outline:none; border-color:#7c3aed; box-shadow:0 0 0 3px rgba(124,58,237,.1); background:rgba(255,255,255,.045); }
    .e-btn { padding:14px 16px; font-size:clamp(14px,1.6vmin,16px); border:none; border-radius:12px; cursor:pointer; font-weight:700; font-family:'Assistant',sans-serif; min-height:50px; transition:transform .15s,box-shadow .2s; display:flex; align-items:center; justify-content:center; gap:6px; }
    .e-btn:active { transform:scale(.96); }
    .e-btn-start { background:#7c3aed; color:#fff; box-shadow:0 4px 16px rgba(124,58,237,.25); }
    .e-btn-start:hover { background:#8b5cf6; transform:scale(1.02); }
    .e-btn-back { background:rgba(255,255,255,.05); color:#7a7e94; border:1px solid rgba(255,255,255,.06); }
    .e-btn-share-full { width:100%; background:rgba(124,58,237,.1); color:#a78bfa; border:1px solid rgba(124,58,237,.18); padding:14px 16px; font-size:clamp(14px,1.6vmin,16px); border-radius:12px; cursor:pointer; font-weight:700; font-family:'Assistant',sans-serif; min-height:50px; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:10px; }
    .e-btn-share-full:hover { background:rgba(124,58,237,.2); border-color:rgba(124,58,237,.35); transform:scale(1.01); }
    .share-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1e1e2e; color:#e8e4f8; padding:12px 24px; border-radius:10px; font-size:14px; z-index:9999; opacity:0; transition:all .3s ease; pointer-events:none; border:1px solid rgba(124,58,237,.2); box-shadow:0 4px 20px rgba(0,0,0,.4); font-family:'Assistant',sans-serif; }
    .share-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

<!-- ══ SCREEN & EDITOR LOGIC ══ -->
<script>
/* ── Default products ── */
const ED_PALETTES = {
  robot:      [{n:'ציאן',c:'#06b6d4'},{n:'כחול',c:'#3b82f6'},{n:'ירוק',c:'#14b8a6'},{n:'לבנדר',c:'#818cf8'},{n:'כסף',c:'#94a3b8'}],
  retro:      [{n:'ענבר',c:'#dc8c14'},{n:'מהגוני',c:'#b23016'},{n:'ברונזה',c:'#af6e1c'},{n:'זהב',c:'#d0a41c'},{n:'נחושת',c:'#c45620'}],
  futuristic: [{n:'ניאון',c:'#00d4ff',c2:'#a855f7'},{n:'מטריקס',c:'#00e65a',c2:'#00c8ff'},{n:'וייב',c:'#ec4899',c2:'#fb923c'},{n:'פריזמה',c:'#6366f1',c2:'#22d3ee'},{n:'פלזמה',c:'#facc15',c2:'#ef4444'}],
};

function buildPaletteRow(theme, selectedIdx) {
  const row = document.getElementById('palette-row');
  if (!row) return;
  row.innerHTML = '';
  (ED_PALETTES[theme] || []).forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'palette-swatch' + (i === selectedIdx ? ' active' : '');
    const btn = document.createElement('div');
    btn.className = 'palette-dot';
    btn.style.background = p.c2 ? `linear-gradient(135deg,${p.c} 0%,${p.c2} 100%)` : p.c;
    btn.style.boxShadow = i === selectedIdx ? `0 0 12px ${p.c},0 4px 14px rgba(0,0,0,.35)` : '0 2px 6px rgba(0,0,0,.25)';
    const lbl = document.createElement('span');
    lbl.className = 'palette-name';
    lbl.textContent = p.n || '';
    wrap.appendChild(btn);
    wrap.appendChild(lbl);
    wrap.addEventListener('click', () => {
      _edState.palette = i;
      buildPaletteRow(_edState.theme, i);
    });
    row.appendChild(wrap);
  });
}

window.GAME_CONFIG = {
  duration: 45,
  speed: 0.56,
  theme: 'futuristic',
  palette: 0,
  texts: {
    startTitle: 'שלוף מתנה',
    startDesc:  'יש לכם 45 שניות לאסוף פריטים כדי לנצח!',
    winMsg:  'ניצחתם!',
    failMsg: 'נסיון נכשל'
  },
  products: [
    { id:'p1', img:'https://static.wixstatic.com/media/b4f4e1_4bca205de05844548a674ccac0b2b923~mv2.jpg', glow:'rgba(236,72,153,.7)',  label:'פרס',    rare:false },
    { id:'p2', img:'https://static.wixstatic.com/media/b4f4e1_e88091526714445eb08d17c3eb1cd816~mv2.jpg', glow:'rgba(168,85,247,.7)',  label:'פרס',    rare:false },
    { id:'p3', img:'https://static.wixstatic.com/media/b4f4e1_4c85b50a0b1942e3af182f257df85340~mv2.jpg', glow:'rgba(52,211,153,.7)',  label:'פרס',    rare:false },
    { id:'p4', img:'https://static.wixstatic.com/media/b4f4e1_67ea71f241364e8ebb6612ebfd85d44d~mv2.jpg', glow:'rgba(96,165,250,.7)',  label:'פרס',    rare:false },
    { id:'p6', img:'https://static.wixstatic.com/media/b4f4e1_bb9d4294f3fc4e4ca166076c43a7b0a1~mv2.jpg', glow:'rgba(52,211,153,.7)',  label:'פרס',    rare:false },
    { id:'p5', img:'https://static.wixstatic.com/media/b4f4e1_02539c0d83b54c65b0763ddf1d0f12a7~mv2.jpg', glow:'rgba(253,224,71,.9)',  label:"ג'קפוט", rare:true  },
  ]
};

const DIFFICULTY = {
  easy:   { duration:45, speed:0.36, goal:3 },
  medium: { duration:45, speed:0.56, goal:5 },
  hard:   { duration:45, speed:0.78, goal:7 }
};

const _edState   = { difficulty:'medium', theme:'futuristic', palette:0 };
const _edImages  = {};
const _edDeleted = new Set();
let   _origItems = null;

function _ensureOrig() {
  if (!_origItems) _origItems = window.GAME_CONFIG.products.map(p => ({...p}));
}

/* ── Screen management ── */
function showScreen(mode) {
  document.getElementById('welcome-screen').style.display  = mode==='welcome' ? 'flex'  : 'none';
  document.getElementById('editor-screen').style.display   = mode==='editor'  ? 'block' : 'none';
  document.getElementById('root').style.display            = mode==='game'    ? 'block' : 'none';
  document.getElementById('back-to-editor-btn').classList.toggle('visible', mode==='game');
  document.body.classList.toggle('game-active', mode==='game');
}

/* ── Apply editor → GAME_CONFIG ── */
function applyEditorToConfig() {
  _ensureOrig();
  const v = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  const diff = DIFFICULTY[_edState.difficulty] || DIFFICULTY.medium;
  window.GAME_CONFIG.duration = diff.duration;
  window.GAME_CONFIG.speed    = diff.speed;
  window.GAME_CONFIG.goal     = diff.goal;
  window.GAME_CONFIG.theme    = _edState.theme || 'robot';
  window.GAME_CONFIG.palette  = _edState.palette ?? 0;
  window.GAME_CONFIG.texts = {
    startTitle: v('ed-start-title') || 'שלוף מתנה',
    startDesc:  v('ed-start-desc')  || 'יש לכם 45 שניות לאסוף פריטים כדי לנצח!',
    winMsg:  v('ed-win-msg')  || 'ניצחתם!',
    failMsg: v('ed-fail-msg') || 'נסיון נכשל'
  };
  window.GAME_CONFIG.products = _origItems
    .map((p,i) => ({ ...p, img: _edImages[i] !== undefined ? _edImages[i] : p.img }))
    .filter((_,i) => !_edDeleted.has(i));
  if (!window.GAME_CONFIG.products.length)
    window.GAME_CONFIG.products = _origItems.map(p=>({...p}));
}

/* ── Start from HTML ── */
function startFromHTML() {
  applyEditorToConfig();
  showScreen('game');
  setTimeout(() => window.__clawRefreshConfig?.(), 30);
}

/* ── Build editor image tiles ── */
function _renderTile(grid, item, origIdx, isFirst, label) {
  _ensureOrig();
  const isDeleted = _edDeleted.has(origIdx);
  const src = _edImages[origIdx] || item.img || '';
  const div = document.createElement('div');
  div.className = 'asset-item';

  if (isDeleted) {
    div.innerHTML = `
      ${label ? `<label>${label}</label>` : ''}
      <label class="asset-placeholder" for="ed-file-${origIdx}">
        <span class="plus-icon">+</span>העלה תמונה
      </label>
      <input type="file" id="ed-file-${origIdx}" accept="image/*">`;
  } else {
    const delBtn = isFirst ? '' : `<button class="del-btn" data-del="${origIdx}" title="מחק"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`;
    div.innerHTML = `
      ${label ? `<label>${label}</label>` : ''}
      <div class="asset-thumb">
        <img src="${src}" alt="">
        <div class="asset-overlay">
          <label class="upload-btn" for="ed-file-${origIdx}">החלף</label>
          ${delBtn}
        </div>
      </div>
      <input type="file" id="ed-file-${origIdx}" accept="image/*">`;
  }
  grid.appendChild(div);

  div.querySelector(`#ed-file-${origIdx}`).addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => { _edImages[origIdx]=ev.target.result; _edDeleted.delete(origIdx); buildEditorImages(); };
    r.readAsDataURL(f);
  });
  const delEl = div.querySelector(`[data-del="${origIdx}"]`);
  if (delEl) delEl.addEventListener('click', () => { _edDeleted.add(origIdx); delete _edImages[origIdx]; buildEditorImages(); });
}

function buildEditorImages() {
  _ensureOrig();
  const grid = document.getElementById('ed-items-list');
  if (!grid) return;
  grid.innerHTML = '';
  const firstActiveProd = _origItems.findIndex((p,i) => !p.rare && !_edDeleted.has(i));
  let prodNum=1;
  _origItems.forEach((item, origIdx) => {
    if (!_edImages[origIdx] && item.img) _edImages[origIdx] = item.img;
    const label = item.rare ? "ג'קפוט" : `מוצר ${prodNum++}`;
    _renderTile(grid, item, origIdx, origIdx===firstActiveProd, label);
  });
}

/* ── Share ── */
function shareGame() {
  _ensureOrig();
  const v = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  const imgs = {};
  _origItems.forEach((orig,i) => { const cur=_edImages[i]; if(cur && cur!==orig.img) imgs[i]=cur; });
  const payload = {
    d: _edState.difficulty,
    th: _edState.theme,
    pal: _edState.palette,
    t: { title:v('ed-start-title'), desc:v('ed-start-desc'), win:v('ed-win-msg'), fail:v('ed-fail-msg') },
    del: [..._edDeleted]
  };
  if (Object.keys(imgs).length) payload.imgs = imgs;
  try {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const url = window.location.href.split('#')[0] + '#g=' + encoded;
    navigator.clipboard.writeText(url).catch(() => {
      const ta=document.createElement('textarea'); ta.value=url;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    const t = document.getElementById('share-toast');
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
  } catch(e) {}
}

/* ── Load from URL hash ── */
function loadFromHash() {
  const hash = window.location.hash;
  if (!hash.startsWith('#g=')) return;
  try {
    const payload = JSON.parse(decodeURIComponent(escape(atob(hash.slice(3)))));
    _ensureOrig();
    if (payload.d && DIFFICULTY[payload.d]) {
      _edState.difficulty = payload.d;
      document.querySelectorAll('[data-diff]').forEach(b => b.classList.toggle('active', b.dataset.diff===payload.d));
    }
    if (payload.th && ['robot','retro','futuristic'].includes(payload.th)) {
      _edState.theme = payload.th;
      document.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('active', b.dataset.theme===payload.th));
    }
    if (payload.pal !== undefined) {
      _edState.palette = +payload.pal || 0;
    }
    buildPaletteRow(_edState.theme, _edState.palette);
    if (payload.t) {
      if (payload.t.title) document.getElementById('ed-start-title').value = payload.t.title;
      if (payload.t.desc)  document.getElementById('ed-start-desc').value  = payload.t.desc;
      if (payload.t.win)   document.getElementById('ed-win-msg').value     = payload.t.win;
      if (payload.t.fail)  document.getElementById('ed-fail-msg').value    = payload.t.fail;
    }
    if (payload.del) payload.del.forEach(i => _edDeleted.add(i));
    if (payload.imgs) Object.assign(_edImages, payload.imgs);
    buildEditorImages();
  } catch(e) {}
}

/* ── Wire up buttons ── */
document.addEventListener('DOMContentLoaded', () => {
  showScreen('welcome');
  buildEditorImages();
  buildPaletteRow(_edState.theme, _edState.palette);
  loadFromHash();

  document.getElementById('wlc-play-btn').addEventListener('click', startFromHTML);
  document.getElementById('wlc-edit-btn').addEventListener('click', () => showScreen('editor'));
  document.getElementById('ed-back-btn').addEventListener('click', () => showScreen('welcome'));
  document.getElementById('ed-start-btn').addEventListener('click', startFromHTML);
  document.getElementById('ed-share-btn').addEventListener('click', shareGame);
  document.getElementById('back-to-editor-btn').addEventListener('click', () => {
    window.__clawStopGame?.();
    showScreen('editor');
  });

  document.querySelectorAll('[data-diff]').forEach(btn => {
    btn.addEventListener('click', () => {
      _edState.difficulty = btn.dataset.diff;
      document.querySelectorAll('[data-diff]').forEach(b => b.classList.toggle('active', b===btn));
    });
  });
  document.querySelectorAll('[data-theme]').forEach(btn => {
    btn.addEventListener('click', () => {
      _edState.theme = btn.dataset.theme;
      _edState.palette = 0;
      document.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('active', b===btn));
      buildPaletteRow(btn.dataset.theme, 0);
    });
  });
});
</script>

/* ═══════════════════════════════════════
   PRODUCT HELPERS
═══════════════════════════════════════ */
let _lastIdx = -1;
const pickProduct = (rare = false) => {
  const prods = window.GAME_CONFIG?.products || [];
  if (rare) return prods.find(p => p.rare) || prods[prods.length-1];
  const nonRare = prods.filter(p => !p.rare);
  if (!nonRare.length) return prods[0];
  let idx;
  do { idx = Math.floor(Math.random() * nonRare.length); } while (idx === _lastIdx && nonRare.length > 1);
  _lastIdx = idx;
  return nonRare[idx];
};
const randScale = () => +(0.78 + Math.random() * 0.84).toFixed(2);

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
const App = () => {
  const [score,      setScore]      = useState(0);
  const [goal,       setGoal]       = useState(3);
  const [items,      setItems]      = useState([]);
  const [clawPos,    setClawPos]    = useState(0);
  const [clawState,  setClawState]  = useState('idle');
  const [caughtItem, setCaughtItem] = useState(null);
  const [messages,   setMessages]   = useState([]);
  const [particles,  setParticles]  = useState([]);
  const [timeLeft,   setTimeLeft]   = useState(45);
  const [gameState,  setGameState]  = useState('idle');
  const [gameActive, setGameActive] = useState(false);
  const [dropTarget, setDropTarget] = useState(70);
  const [shake,      setShake]      = useState(false);
  const [scoreKey,   setScoreKey]   = useState(0);
  const [isMobile,   setIsMobile]   = useState(() => window.innerWidth < 640);

  const rafRef      = useRef();
  const gameAreaRef = useRef(null);
  const gotItemRef  = useRef(null);
  const scoreRef    = useRef(0);
  const startGameRef = useRef(null);

  const L = useMemo(() => {
    const m = window.innerWidth < 640;
    return {
      beltH:       m ? 130 : 158,
      surfaceH:    m ?  62 :  78,
      itemsBottom: m ?  44 :  56,
      emojiH:      72,
      rowH:        m ?  42 :  52,
      armPivot:    m ?  34 :  44,
      armLen:      m ?  44 :  56,
    };
  }, [isMobile]);

  const armTip    = L.armPivot + L.armLen;
  const itemCenter = L.itemsBottom + L.emojiH / 2;

  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth < 640);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);

  useEffect(() => {
    const calc = () => {
      if (!gameAreaRef.current) return;
      const h = gameAreaRef.current.clientHeight;
      const targetPx = (h - itemCenter) - armTip;
      setDropTarget(Math.max(25, Math.min(92, (targetPx / h) * 100)));
    };
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, [L, itemCenter, armTip, gameActive]);

  useEffect(() => {
    if (gameState !== 'playing' || timeLeft <= 0) return;
    const t = setTimeout(() => {
      setTimeLeft(p => { if (p <= 10) SFX.tick(); return p - 1; });
    }, 1000);
    return () => clearTimeout(t);
  }, [gameState, timeLeft]);

  useEffect(() => {
    if (gameState === 'playing' && timeLeft === 0) {
      setGameState('ended');
      setGameActive(false);
      setTimeout(() => scoreRef.current >= (window.GAME_CONFIG?.goal||3) ? SFX.win() : SFX.lose(), 150);
    }
  }, [timeLeft, gameState]);

  /* Init items on mount */
  useEffect(() => {
    setItems([
      {x:8,row:0},{x:36,row:1},{x:64,row:0},{x:90,row:1},
    ].map((p,i) => ({
      id:Math.random(), x:p.x, row:p.row,
      type:pickProduct(), scale:randScale()*(p.row?.84:1),
      grabbed:false, bobDelay:i*0.28,
    })));

              borderRadius:'50%',
              background: gameState==='ended' && score>=goal
                ? `radial-gradient(ellipse,rgba(${T.accentR},.28) 0%,transparent 70%)`
                : gameState==='ended'
                  ? 'radial-gradient(ellipse,rgba(239,68,68,.18) 0%,transparent 70%)'
                  : `radial-gradient(ellipse,rgba(${T.accentR},.18) 0%,transparent 70%)`,
              filter:'blur(40px)',
            }}/>
          </div>

          {/* card */}
          <div className="relative z-10 flex flex-col items-center gap-5 sm:gap-7 w-full max-w-sm text-center">

            {gameState === 'idle' && (<>
              <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl flex items-center justify-center border"
                style={{background:T.hudBg, borderColor:T.hudB, boxShadow:`0 0 32px rgba(${T.accentR},.25)`}}>
                <TrophyIcon className="w-7 h-7 sm:w-8 sm:h-8" style={{color:T.hudTxt}}/>
              </div>
              <h1 className="font-orb font-bold tracking-tight leading-none"
                style={{fontSize:'clamp(2rem,7vw,2.8rem)', color:T.hudTxt}}>
                {texts.startTitle || 'שלוף מתנה'}
              </h1>
              <div className="w-20 h-px" style={{background:`linear-gradient(90deg,transparent,rgba(${T.accentR},.7),transparent)`}}/>
              <p className="text-sm sm:text-base leading-relaxed" style={{color:'rgba(255,255,255,.55)'}}>
                {texts.startDesc || 'יש לכם 45 שניות לאסוף פריטים כדי לנצח!'}
              </p>
              <button onClick={startGame}
                className="font-bold text-base sm:text-lg py-3 px-10 sm:px-14 rounded-full transition-all active:scale-95 mt-2"
                style={{background:T.btnOn, color:'#0f172a', boxShadow:`0 0 28px rgba(${T.accentR},.45)`, cursor:'pointer', letterSpacing:'0.02em'}}>
                התחל לתפוס
              </button>
            </>)}

            {gameState === 'ended' && score >= goal && (<>
              <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl flex items-center justify-center border"
                style={{background:T.hudBg, borderColor:T.hudB, boxShadow:`0 0 32px rgba(${T.accentR},.3)`}}>
                <TrophyIcon className="w-7 h-7 sm:w-8 sm:h-8" style={{color:T.hudTxt}}/>
              </div>
              <h1 className="font-orb font-bold tracking-tight leading-none"
                style={{fontSize:'clamp(2rem,7vw,2.8rem)', color:T.hudTxt}}>
                {texts.winMsg || 'ניצחתם!'}
              </h1>
              <div className="w-20 h-px" style={{background:`linear-gradient(90deg,transparent,rgba(${T.accentR},.7),transparent)`}}/>
              <p className="text-sm sm:text-base leading-relaxed" style={{color:'rgba(255,255,255,.55)'}}>
                אספתם <span className="font-bold" style={{color:T.hudTxt}}>{score} פריטים</span>
                <br/>כל הכבוד!
              </p>
              <button onClick={startGame}
                className="flex items-center gap-2 font-bold text-base sm:text-lg py-3 px-10 sm:px-14 rounded-full transition-all active:scale-95 mt-2"
                style={{background:T.btnOn, color:'#0f172a', boxShadow:`0 0 28px rgba(${T.accentR},.45)`, cursor:'pointer'}}>
                <PlayIcon className="w-5 h-5"/> שחק שוב
              </button>
            </>)}

            {gameState === 'ended' && score < goal && (<>
              <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl flex items-center justify-center border"
                style={{background:'rgba(239,68,68,.12)', borderColor:'rgba(239,68,68,.3)', boxShadow:'0 0 32px rgba(239,68,68,.2)'}}>
                <ClockIcon className="w-7 h-7 sm:w-8 sm:h-8" style={{color:'#f87171'}}/>
              </div>
              <h1 className="font-orb font-bold tracking-tight leading-none"
                style={{fontSize:'clamp(2rem,7vw,2.8rem)', color:'#fca5a5'}}>
                {texts.failMsg || 'נסיון נכשל'}
              </h1>
              <div className="w-20 h-px" style={{background:'linear-gradient(90deg,transparent,rgba(239,68,68,.6),transparent)'}}/>
              <p className="text-sm sm:text-base leading-relaxed" style={{color:'rgba(255,255,255,.55)'}}>
                אספתם <span className="font-bold text-red-400">{score} פריטים</span>
                <br/>צריך לפחות {goal} כדי לנצח
              </p>
              <button onClick={startGame}
                className="flex items-center gap-2 bg-red-500 hover:bg-red-400 text-white font-bold text-base sm:text-lg py-3 px-10 sm:px-14 rounded-full transition-all active:scale-95 mt-2"
                style={{boxShadow:'0 0 28px rgba(239,68,68,.4)', cursor:'pointer'}}>
                <PlayIcon className="w-5 h-5"/> נסה שוב
              </button>
            </>)}

          </div>
        </div>
      )}

      {/* MACHINE FRAME */}
      <div className={`w-full max-w-xl rounded-2xl border-2 flex flex-col overflow-hidden relative z-10 ${shake?'do-shake':''}`}
        style={{height:'100%', maxHeight:'880px', padding:sz?'8px':'12px', gap:sz?'6px':'10px',
          background:T.frameBg, animation:`${T.frameAnim} 3s ease-in-out infinite`}}>

        {/* HEADER */}
        <div className="flex-none flex items-center justify-between px-2 py-1 sm:px-3 sm:py-2 rounded-xl border"
          style={{background:T.hudBg, borderColor:T.hudB}}>
          <div className="flex items-center gap-2">
            <div className="p-1.5 rounded-lg border" style={{background:T.hudI, borderColor:T.hudIB}}>
              <TrophyIcon className="w-4 h-4" style={{color:T.hudTxt}} />
            </div>
            <div>
              <p className="text-[9px] uppercase tracking-widest font-orb" style={{color:T.hudSub}}>פריטים</p>
              <p key={scoreKey} className={`font-orb text-lg sm:text-xl font-bold leading-none ${scoreKey>0?'score-pop':''}`}
                style={{color:T.hudTxt}}>{score}</p>
            </div>
          </div>
          <div className="flex items-center gap-1.5">
            {Array.from({length:goal},(_,i) => (
              <div key={i} className={`rounded-full border-2 transition-all duration-300 ${score>i?'dot-fill':''}`}
                style={{width:sz?'10px':'13px', height:sz?'10px':'13px',
                  background:score>i?T.sA:T.dotI, borderColor:score>i?T.sAB:T.dotIB,
                  boxShadow:score>i?`0 0 8px ${T.sGlow}`:'none'}} />
            ))}
            <span className="text-[9px] font-orb ml-0.5" style={{color:T.hudSub}}>/{goal}</span>
          </div>
          <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border transition-all ${isDanger?T.timerDanger:''}`}
            style={isDanger?{}:{background:T.timerBg, borderColor:T.timerB}}>
            <ClockIcon className={`${sz?'w-3 h-3':'w-4 h-4'} ${isDanger?'animate-pulse':''}`}
              style={{color:isDanger?'#f87171':T.hudTxt}} />
            <span className="font-orb font-bold tracking-widest text-sm sm:text-base"
              style={{color:isDanger?'#fca5a5':'#e2e8f0'}}>
              {String(Math.floor(timeLeft/60)).padStart(2,'0')}:{String(timeLeft%60).padStart(2,'0')}
            </span>
          </div>
        </div>

        {/* GAME VIEWPORT */}
        <div className="flex-1 min-h-0 flex flex-col relative px-1">
          <div ref={gameAreaRef}
            className="flex-1 relative rounded-xl border-2 overflow-hidden scanlines"
            style={{background:T.viewBg, borderColor:T.viewBord}}>

            {/* OVERLAYS moved to outermost div */}

            {/* BACKGROUND */}
            <div className="absolute inset-0" style={{background:T.innerBg}}>
              <div className="absolute inset-0 opacity-25" style={{background:T.colLines}}/>
              <div className="absolute inset-0 opacity-20 vert-anim" style={{background:T.vertLines,backgroundSize:'100% 48px'}}/>
              <div className={`absolute top-0 w-full h-3 ${T.topStripe}`}/>
              <div className="absolute inset-0 pointer-events-none" style={{background:'radial-gradient(ellipse at 50% 20%,transparent 0%,rgba(0,0,0,.75) 100%)'}}/>
              <div className="absolute top-0 left-1/2 -translate-x-1/2 pointer-events-none"
                style={{width:T.topGlowW||'140px',height:T.topGlowH||'60px',opacity:T.topGlowOp??0.25,background:`radial-gradient(ellipse,${T.topGlow} 0%,transparent 70%)`}}/>
            </div>

            {/* SPOTLIGHT */}
            {clawActive && (
              <div className="absolute z-20 pointer-events-none spot-pulse"
                style={{left:'50%',top:`${clawPos}%`,transform:'translateX(-50%)',width:sz?'90px':'120px',height:sz?'200px':'280px',
                  background:T.spotGrad,
                  clipPath:'polygon(28% 0%,72% 0%,100% 100%,0% 100%)'}}/>
            )}

            {/* CLAW */}
            <div className="absolute left-1/2 top-0 z-30"
              style={{transform:'translateX(-50%)', width:sz?'8px':'11px', height:`${clawPos}%`,
                background:T.wire,
                boxShadow:clawActive?`0 0 8px rgba(${T.accentR},.5)`:'none', minHeight:0}}>
              <div className="absolute bottom-0 left-1/2 flex flex-col items-center"
                style={{transform:'translateX(-50%) translateY(100%)', transformOrigin:'top'}}>
                <div className="rounded-t-lg border flex items-center justify-center z-20"
                  style={{width:sz?'48px':'66px', height:sz?'20px':'26px', background:T.metal, borderColor:T.jB,
                    boxShadow:clawActive?`0 0 12px rgba(${T.accentR},.7),inset 0 0 6px rgba(${T.accentR},.2)`:'none'}}>
                  <div className={`rounded-full border-2 ${clawActive?'animate-pulse':''}`}
                    style={{width:sz?'12px':'14px',height:sz?'12px':'14px',
                      background:clawActive?T.dotA:T.dotI, borderColor:clawActive?T.dotAB:T.dotIB,
                      boxShadow:clawActive?`0 0 8px rgba(${T.accentR},.9)`:'none'}}/>
                </div>
                <div className="rounded-b-2xl border-t-2 flex justify-between items-center z-10"
                  style={{width:sz?'76px':'96px', height:sz?'28px':'34px', padding:'0 10px',
                    background:T.clawHead, borderColor:T.jB, boxShadow:'0 6px 16px rgba(0,0,0,.7)'}}>
                  <div className="rounded-full border" style={{width:'13px',height:'13px',background:T.jBg,borderColor:T.jB}}/>
                  <div className="rounded-full border" style={{width:'13px',height:'13px',background:T.jBg,borderColor:T.jB}}/>
                </div>
                <div className="absolute origin-top claw-arm"
                  style={{top:`${L.armPivot}px`, left:'-1px', transform:`rotate(${clawOpen?'44deg':'14deg'})`}}>
                  <div className="rounded-full border shadow-lg relative"
                    style={{width:sz?'12px':'16px', height:`${L.armLen}px`, background:T.metal, borderColor:T.jB,
                      boxShadow:clawActive?`0 0 6px rgba(${T.accentR},.4)`:'none'}}>
                    <div className="absolute rounded-full" style={{bottom:'6px',left:'50%',transform:'translateX(-50%)',width:'7px',height:'7px',background:T.jBg}}/>
                  </div>
                  <div className="absolute origin-top claw-arm"
                    style={{left:'2px', bottom:'-4px', width:sz?'9px':'11px', height:`${L.armLen-6}px`,
                      background:T.finL, borderRadius:'0 0 50px 50px',
                      transform:`rotate(${clawOpen?'-72deg':'-34deg'})`}}/>
                </div>
                <div className="absolute origin-top claw-arm"
                  style={{top:`${L.armPivot}px`, right:'-1px', transform:`rotate(${clawOpen?'-44deg':'-14deg'})`}}>
                  <div className="rounded-full border shadow-lg relative"
                    style={{width:sz?'12px':'16px', height:`${L.armLen}px`, background:T.metal, borderColor:T.jB,
                      boxShadow:clawActive?`0 0 6px rgba(${T.accentR},.4)`:'none'}}>
                    <div className="absolute rounded-full" style={{bottom:'6px',left:'50%',transform:'translateX(-50%)',width:'7px',height:'7px',background:T.jBg}}/>
                  </div>
                  <div className="absolute origin-top claw-arm"
                    style={{right:'2px', bottom:'-4px', width:sz?'9px':'11px', height:`${L.armLen-6}px`,
                      background:T.finR, borderRadius:'0 0 50px 50px',
                      transform:`rotate(${clawOpen?'72deg':'34deg'})`}}/>
                </div>
                {caughtItem && (
                  <div className="absolute flex items-center justify-center animate-bounce"
                    style={{top:`${L.armPivot + L.armLen * 0.6}px`, zIndex:0, filter:`drop-shadow(0 0 14px ${caughtItem.type.glow})`}}>
                    <img src={caughtItem.type.img} style={{width:`${Math.round(72*caughtItem.scale*.8)}px`, height:'auto', display:'block', borderRadius:'6px', border:'1px solid rgba(255,255,255,.18)', padding:'2px', background:'rgba(255,255,255,.06)'}}/>
                  </div>
                )}
              </div>
            </div>

            {/* PARTICLES */}
            {particles.map(p => (
              <div key={p.id} className="particle z-50"
                style={{left:'50%',top:'35%',
                  width:p.size+'px',height:p.size+'px',
                  marginLeft:-(p.size/2)+'px',marginTop:-(p.size/2)+'px',
                  background:p.color, boxShadow:`0 0 ${p.size*2}px ${p.color}`,
                  '--tx':Math.cos(p.angle*Math.PI/180)*p.dist+'px',
                  '--ty':Math.sin(p.angle*Math.PI/180)*p.dist+'px'}}/>
            ))}

            {/* MESSAGES */}
            {messages.map(m => (
              <div key={m.id} className="msg-float font-black"
                style={{top:'32%', fontSize:sz?'17px':'21px',
                  color: m.type==='miss'?'#f87171': m.type==='rare'?'#fde047':'#86efac',
                  textShadow: m.type==='rare'?'0 0 20px rgba(253,224,71,.9),0 0 40px rgba(253,224,71,.5)':'0 0 12px currentColor'}}>
                {m.text}
              </div>
            ))}

            {/* CONVEYOR BELT */}
            <div className="absolute bottom-0 w-full z-10" style={{height:`${L.beltH}px`}}>
              <div className="absolute top-0 w-full h-8 pointer-events-none"
                style={{background:'linear-gradient(180deg,transparent,rgba(0,0,0,.65))'}}/>

              <div className="absolute w-full pointer-events-none z-30"
                style={{bottom:`${L.itemsBottom}px`, height:`${L.emojiH + L.rowH + 24}px`}}>
                {[...items].sort((a,b)=>(b.row||0)-(a.row||0)).map(item => {
                  if (item.grabbed) return null;
                  const nearClaw = Math.abs(item.x - 50) < 9;
                  return (
                    <div key={item.id} className="absolute flex items-end justify-center"
                      style={{left:`${item.x}%`, bottom:0, zIndex: item.row ? 0 : 1}}>
                      <div className="relative flex flex-col items-center"
                        style={{animation:`item-bob ${1.8+item.bobDelay*.08}s ease-in-out ${item.bobDelay}s infinite`}}>
                        <div className="absolute bottom-0 rounded-full"
                          style={{width:'54px',height:'10px',background:'rgba(0,0,0,.85)',filter:'blur(4px)',transform:'scaleY(.28)'}}/>
                        <div className="z-10 relative" style={{filter:`drop-shadow(0 0 12px ${item.type.glow})`, transition:'filter .2s'}}>
                          <img src={item.type.img} style={{width:`${Math.round(72*item.scale)}px`, height:'auto', display:'block', borderRadius:'8px', border:`2px solid ${T.itemBord}`, boxShadow:`inset 0 1px 0 rgba(255,255,255,.10), 0 2px 8px rgba(0,0,0,.3), 0 0 10px rgba(${acc},.18)`, padding:'3px', background:T.itemBg}}/>
                        </div>
                        {nearClaw && clawState==='descending' && (
                          <div className="absolute inset-0 rounded-full animate-pulse pointer-events-none"
                            style={{background:T.nearGlow,transform:'scale(2)',filter:'blur(10px)'}}/>
                        )}
                        {false && (
                          <div className="absolute" style={{top:'-16px',right:'-14px',zIndex:20}}>
                            <span style={{fontSize:'22px',filter:'drop-shadow(0 0 8px #fde047)'}} className="star-spin inline-block">⭐</span>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="absolute bottom-0 w-full z-20" style={{height:`${L.surfaceH}px`}}>
                <div className="absolute inset-0 overflow-hidden"
                  style={{background:T.beltBg, borderTop:`4px solid ${T.beltBord}`}}>
                  <div className="absolute inset-0 belt-anim"
                    style={{background:`repeating-linear-gradient(90deg,transparent 0,transparent 36px,${T.beltS} 36px,${T.beltS} 44px)`}}/>
                  <div className="absolute inset-0"
                    style={{background:'linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 40%,rgba(0,0,0,.3) 100%)'}}/>
                  <div className="absolute w-full" style={{top:'84%',height:'2px',background:T.beltLine}}/>
                </div>
                <div className="absolute bottom-0 w-full z-10 flex justify-around items-center px-2"
                  style={{height:sz?'18px':'24px', background:T.rollerBg, borderTop:`2px solid ${T.rollerBord}`}}>
                  {Array.from({length:10},(_,i) => (
                    <div key={i} className="rounded-full" style={{
                      width:sz?'11px':'15px', height:sz?'11px':'15px',
                      background:T.rdot, border:`1px solid ${T.rdotB}`,
                      boxShadow:'inset 0 1px 3px rgba(255,255,255,.15)'}}/>
                  ))}
                </div>
              </div>
            </div>

            <div className="absolute top-0 left-0 h-full w-1.5 z-20" style={{background:T.pilL,boxShadow:'2px 0 8px rgba(0,0,0,.5)'}}/>
            <div className="absolute top-0 right-0 h-full w-1.5 z-20" style={{background:T.pilR,boxShadow:'-2px 0 8px rgba(0,0,0,.5)'}}/>

          </div>
        </div>

        {/* CONTROL PANEL */}
        <div className="flex-none px-1 pb-1">
          <div className="rounded-xl border flex justify-center sm:justify-between items-center px-4 sm:px-8 py-3 sm:py-4 relative overflow-hidden"
            style={{background:T.panelBg, borderColor:T.panelB}}>
            <div className="hidden sm:flex gap-2 opacity-35">
              {[...Array(5)].map((_,i)=>(
                <div key={i} className="rounded-full border"
                  style={{width:'8px',height:'44px',background:T.pipBg,borderColor:T.pipB}}/>
              ))}
            </div>
            <div className="flex flex-col items-center gap-1.5">
              <button onPointerDown={handleDrop} disabled={!btnReady}
                className={`relative rounded-full flex items-center justify-center overflow-hidden transition-transform active:scale-90 ${btnReady?T.btnAnim:''}`}
                style={{
                  width:sz?'68px':'96px', height:sz?'68px':'96px',
                  background:btnReady?T.btnOn:T.btnOff,
                  border:`${sz?'5px':'7px'} solid ${T.btnBord}`,
                  opacity:btnReady?1:.45, cursor:btnReady?'pointer':'not-allowed',
                  boxShadow:btnReady?`0 0 0 2px ${T.btnGlow},0 12px 25px rgba(0,0,0,.7)`:'0 8px 18px rgba(0,0,0,.6)',
                }}>
                {btnReady && <div className="absolute inset-0 rounded-full bg-white/15 animate-pulse"/>}
                {btnReady && <div className="absolute inset-1 rounded-full" style={{background:'linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 50%)'}}/>}
                <ArrowDownIcon className={`relative z-10 text-white ${btnReady?'animate-bounce':''}`}
                  style={{width:sz?'26px':'38px',height:sz?'26px':'38px',
                    filter:btnReady?'drop-shadow(0 2px 4px rgba(0,0,0,.6))':'none'}}/>
              </button>
              <span className="font-orb text-[8px] uppercase tracking-widest" style={{color:T.btnLbl}}>שחרר</span>
            </div>
            <div className="hidden sm:flex gap-2 opacity-35">
              {[...Array(5)].map((_,i)=>(
                <div key={i} className="rounded-full border"
                  style={{width:'8px',height:'44px',background:T.pipBg,borderColor:T.pipB}}/>
              ))}
            </div>
            <div className="absolute bottom-0 left-4 right-4 h-0.5 rounded-full"
              style={{background:`linear-gradient(90deg,transparent,${btnReady?T.btnLine:T.panelB},transparent)`}}/>
          </div>
        </div>

      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
